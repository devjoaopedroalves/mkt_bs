<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Painel Admin - Festa da Sorte BS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #009739;
            --green-light: #00c853;
            --yellow: #FEDD00;
            --yellow-gold: #FFD700;
            --blue: #012169;
            --dark: #0a0a0f;
            --dark-card: #111118;
            --dark-surface: #1a1a25;
            --white: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 10px;
        }

        .login-box p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 3px;
        }

        .login-box input:focus {
            border-color: var(--green);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--green), var(--green-light));
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0,151,57,0.4);
        }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        /* Admin Dashboard */
        #admin-dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--yellow);
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-admin {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-export {
            background: var(--green);
            color: var(--white);
        }

        .btn-export:hover {
            background: var(--green-light);
            box-shadow: 0 0 20px rgba(0,151,57,0.4);
        }

        .btn-clear {
            background: rgba(255,50,50,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255,50,50,0.3);
        }

        .btn-clear:hover {
            background: rgba(255,50,50,0.4);
        }

        .btn-logout {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.2);
            color: var(--white);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-icon {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--yellow);
        }

        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Search */
        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 18px;
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--green);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--dark-card);
        }

        thead th {
            background: var(--dark-surface);
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--yellow);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        tbody td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            white-space: nowrap;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .prize-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .empty-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-screen">
        <div class="login-box">
            <h1>🔒 PAINEL ADMIN</h1>
            <p>Festa da Sorte BS - Área Restrita</p>
            <input type="password" id="admin-password" placeholder="Senha" onkeydown="if(event.key==='Enter')adminLogin()">
            <button onclick="adminLogin()">ENTRAR</button>
            <p class="login-error" id="login-error">Senha incorreta!</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="admin-dashboard">
        <div class="admin-header">
            <h1>🏆 PAINEL ADMIN - FESTA DA SORTE BS</h1>
            <div class="admin-actions">
                <button class="btn-admin btn-export" onclick="exportExcel()">📊 Exportar Excel</button>
                <button class="btn-admin btn-clear" onclick="clearData()">🗑️ Limpar Dados</button>
                <button class="btn-admin btn-logout" onclick="adminLogout()">🚪 Sair</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Participantes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🩲</div>
                <div class="stat-value" id="stat-calcinha">0</div>
                <div class="stat-label">Calcinhas Grátis</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🩲🩲</div>
                <div class="stat-value" id="stat-duas">0</div>
                <div class="stat-label">Duas Calcinhas</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="stat-50off">0</div>
                <div class="stat-label">50% OFF</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="stat-today">0</div>
                <div class="stat-label">Hoje</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 Buscar por nome, Instagram, WhatsApp ou prêmio..." oninput="renderTable()">
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Instagram</th>
                        <th>WhatsApp</th>
                        <th>Prêmio</th>
                        <th>Código</th>
                        <th>Data</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'bs2024admin';
        const STORAGE_KEY = 'bs_festa_participants';

        function adminLogin() {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                loadDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('login-error').style.display = 'none';
                }, 3000);
            }
        }

        function adminLogout() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-dashboard').style.display = 'none';
            document.getElementById('admin-password').value = '';
        }

        function getParticipants() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch { return []; }
        }

        function loadDashboard() {
            const participants = getParticipants();
            const today = new Date().toLocaleDateString('pt-BR');

            document.getElementById('stat-total').textContent = participants.length;
            document.getElementById('stat-calcinha').textContent = participants.filter(p => p.prize === 'Calcinha Grátis').length;
            document.getElementById('stat-duas').textContent = participants.filter(p => p.prize === 'Duas Calcinhas Grátis').length;
            document.getElementById('stat-50off').textContent = participants.filter(p => p.prize === '50% OFF').length;
            document.getElementById('stat-today').textContent = participants.filter(p => p.date === today).length;

            renderTable();
        }

        function renderTable() {
            const participants = getParticipants();
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            const tbody = document.getElementById('table-body');

            const filtered = participants.filter(p => {
                if (!search) return true;
                return (
                    p.nome.toLowerCase().includes(search) ||
                    p.instagram.toLowerCase().includes(search) ||
                    (p.whatsappFormatted || p.whatsapp).includes(search) ||
                    p.prize.toLowerCase().includes(search) ||
                    (p.code || '').toLowerCase().includes(search)
                );
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-icon">📋</div>
                                <p>Nenhuma participação encontrada.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            const prizeColors = {
                '5% OFF': 'rgba(46,125,50,0.2); color: #2e7d32',
                '10% OFF': 'rgba(0,151,57,0.2); color: #009739',
                '15% OFF': 'rgba(254,221,0,0.2); color: #FEDD00',
                '40% OFF': 'rgba(1,33,105,0.3); color: #5c8aff',
                'Calcinha Grátis': 'rgba(0,200,83,0.2); color: #00c853',
                'Duas Calcinhas Grátis': 'rgba(255,107,0,0.2); color: #ff6b00',
                '50% OFF': 'rgba(255,215,0,0.2); color: #FFD700',
            };

            tbody.innerHTML = filtered.reverse().map((p, i) => `
                <tr>
                    <td>${filtered.length - i}</td>
                    <td><strong>${p.nome}</strong></td>
                    <td>${p.instagram}</td>
                    <td>${p.whatsappFormatted || p.whatsapp}</td>
                    <td><span class="prize-badge" style="background: ${prizeColors[p.prize] || 'rgba(255,255,255,0.1); color: #fff'}">${p.prizeIcon || ''} ${p.prize}</span></td>
                    <td>${p.code || '-'}</td>
                    <td>${p.date}</td>
                    <td>${p.time}</td>
                </tr>
            `).join('');
        }

        function exportExcel() {
            const participants = getParticipants();
            if (participants.length === 0) {
                alert('Nenhum dado para exportar!');
                return;
            }

            // CSV with BOM for Excel compatibility
            let csv = '\uFEFF';
            csv += 'Nome,Instagram,WhatsApp,Prêmio,Código,Data,Hora\n';

            participants.forEach(p => {
                csv += `"${p.nome}","${p.instagram}","${p.whatsappFormatted || p.whatsapp}","${p.prizeIcon || ''} ${p.prize}","${p.code || ''}","${p.date}","${p.time}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `festa_da_sorte_bs_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearData() {
            if (confirm('⚠️ ATENÇÃO!\n\nIsso vai apagar TODOS os dados de participantes.\n\nTem certeza?')) {
                if (confirm('🚨 Última chance!\n\nDeseja realmente apagar todos os dados?\nEssa ação não pode ser desfeita.')) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem('bs_festa_used_numbers');
                    loadDashboard();
                    alert('✅ Dados apagados com sucesso!');
                }
            }
        }

        // Auto-refresh every 10 seconds
        setInterval(() => {
            if (document.getElementById('admin-dashboard').style.display === 'block') {
                loadDashboard();
            }
        }, 10000);
    </script>
</body>
</html>
